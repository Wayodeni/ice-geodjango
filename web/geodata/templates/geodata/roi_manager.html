{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>IceAnalytica ROI Manager</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet"
              href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

        <link rel="stylesheet" href="{% static 'geodata/css/roi_manager.css' %}">
    </head>
    <body>
        <div class="page">
            <header class="topbar">
                <div>
                    <h1>IceAnalytica</h1>
                    <p>ROI creation, editing and mosaic job management</p>
                </div>
                <div class="topbar-actions">
                    <button id="refreshJobsButton">Refresh jobs</button>
                    <button id="fitRoisButton">Fit ROIs</button>
                </div>
            </header>

            <main class="layout">
                <section class="map-panel">
                    <div id="map"></div>
                    <div class="status-line" id="statusLine">Draw polygon or rectangle to create ROI.</div>
                </section>

                <aside class="side-panel">
                    <section class="card">
                        <h2>Selected ROI</h2>

                        <label for="roiNameInput">ROI name</label>
                        <input id="roiNameInput" type="text" placeholder="New ROI">

                        <div class="button-row">
                            <button id="saveRoiButton">Save ROI</button>
                            <button id="deleteRoiButton" class="danger">Delete ROI</button>
                            <button id="clearSelectionButton">Clear</button>
                        </div>

                        <div class="small-info" id="selectedRoiInfo">No ROI selected.</div>
                    </section>

                    <section class="card">
                        <h2>Create mosaic job</h2>

                        <label for="targetDateInput">Target date</label>
                        <input id="targetDateInput" type="date" value="2024-08-01">

                        <label for="timeWindowInput">Time window, days</label>
                        <input id="timeWindowInput" type="number" min="1" max="30" value="7">

                        <label>Sensors</label>
                        <div class="checkbox-row">
                            <label>
                                <input id="sentinel2Input" type="checkbox" checked>
                                Sentinel-2 L2A
                            </label>
                            <label>
                                <input id="sentinel1Input" type="checkbox">
                                Sentinel-1 RTC
                            </label>
                        </div>

                        <label for="targetCrsInput">Target CRS</label>
                        <input id="targetCrsInput" type="text" value="EPSG:32643">

                        <label for="resolutionInput">Resolution, meters</label>
                        <input id="resolutionInput" type="number" value="10" min="10" step="10">

                        <label for="cloudCoverInput">Max cloud cover, %</label>
                        <input id="cloudCoverInput" type="number" value="40" min="0" max="100">

                        <div class="button-row">
                            <button id="createJobButton">Create job</button>
                            <button id="createAndRunJobButton">Create and run</button>
                        </div>
                    </section>

                    <section class="card">
                        <h2>Jobs</h2>
                        <div id="jobsList" class="jobs-list"></div>
                    </section>
                </aside>
            </main>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
        <script src="{% static 'geodata/js/roi_manager.js' %}"></script>
    </body>
</html>
